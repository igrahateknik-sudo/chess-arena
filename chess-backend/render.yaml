services:
  - type: web
    name: chess-arena-backend
    env: node
    region: singapore  # Paling dekat ke Indonesia
    plan: starter       # Free tier cukup untuk development/staging
    buildCommand: npm install
    startCommand: node src/server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      # Isi manual di Render dashboard:
      # - key: SUPABASE_URL
      # - key: SUPABASE_SERVICE_KEY
      # - key: JWT_SECRET
      # - key: ALLOWED_ORIGINS
      # - key: MIDTRANS_SERVER_KEY
      # - key: MIDTRANS_CLIENT_KEY
